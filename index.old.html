<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprintr — Agile Project Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #5C4FE5;
    --brand-dark: #4438C4;
    --brand-light: #EEF0FF;
    --brand-mid: #7B72EE;
    --bg: #F4F5F9;
    --white: #FFFFFF;
    --sidebar-w: 240px;
    --text: #1A1D2E;
    --text-2: #6B7280;
    --text-3: #9CA3AF;
    --border: #E5E7EB;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 24px rgba(92,79,229,0.12);
  }
  html, body, #root { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  button { cursor: pointer; font-family: inherit; border: none; background: none; }
  input, textarea, select { font-family: inherit; }

  /* ── LAYOUT ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--white); display: flex; flex-direction: column;
    border-right: 1px solid var(--border); padding: 0 0 16px; overflow-y: auto;
  }
  .logo { padding: 22px 20px 18px; display: flex; align-items: center; gap: 8px; }
  .logo-mark { width: 32px; height: 32px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 18px; height: 18px; fill: white; }
  .logo-text { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .logo-text span { color: var(--brand); }
  .nav-label { font-size: 10px; font-weight: 700; color: var(--text-3); letter-spacing: 1.2px; text-transform: uppercase; padding: 8px 20px 6px; margin-top: 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 10px 16px 10px 20px;
    font-size: 14px; font-weight: 500; color: var(--text-2); cursor: pointer;
    border-radius: 0; transition: all 0.15s; margin: 1px 0; position: relative;
  }
  .nav-item:hover { color: var(--brand); background: var(--brand-light); }
  .nav-item.active {
    color: var(--brand); font-weight: 700; background: var(--brand-light);
  }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 4px; background: var(--brand); border-radius: 0 4px 4px 0;
  }
  .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-badge { margin-left: auto; background: var(--brand); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .sidebar-bottom { margin-top: auto; padding: 12px 12px 0; }
  .sidebar-promo {
    background: linear-gradient(135deg, #1A1D2E 0%, #2d3155 100%);
    border-radius: var(--radius); padding: 18px 16px; color: white; position: relative; overflow: hidden;
  }
  .sidebar-promo::before { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; background: rgba(92,79,229,0.4); border-radius: 50%; }
  .sidebar-promo::after { content: ''; position: absolute; bottom: -10px; left: 20px; width: 50px; height: 50px; background: rgba(123,114,238,0.3); border-radius: 50%; }
  .promo-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; position: relative; z-index: 1; }
  .promo-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; position: relative; z-index: 1; }
  .promo-sub { font-size: 11px; color: rgba(255,255,255,0.65); margin-bottom: 12px; position: relative; z-index: 1; }
  .promo-btn { width: 100%; background: var(--brand); color: white; border-radius: 8px; padding: 8px; font-size: 12px; font-weight: 700; position: relative; z-index: 1; transition: background 0.15s; }
  .promo-btn:hover { background: var(--brand-dark); }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* TOPBAR */
  .topbar {
    background: var(--white); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; padding: 12px 24px; flex-shrink: 0;
  }
  .search-wrap {
    flex: 1; max-width: 480px; display: flex; align-items: center; gap: 10px;
    background: var(--bg); border-radius: 12px; padding: 9px 14px; border: 1.5px solid transparent; transition: border-color 0.15s;
  }
  .search-wrap:focus-within { border-color: var(--brand); background: white; }
  .search-wrap input { flex: 1; background: none; border: none; outline: none; font-size: 13.5px; color: var(--text); }
  .search-wrap input::placeholder { color: var(--text-3); }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text-2); transition: all 0.15s; position: relative;
  }
  .icon-btn:hover { background: var(--brand-light); color: var(--brand); }
  .notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: #EF4444; border-radius: 50%; border: 2px solid white; }
  .user-chip {
    display: flex; align-items: center; gap: 10px; padding: 6px 10px 6px 6px;
    background: var(--bg); border-radius: 12px; cursor: pointer; transition: background 0.15s;
  }
  .user-chip:hover { background: var(--brand-light); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--brand); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .user-role { font-size: 11px; color: var(--text-3); }

  /* PAGE CONTENT */
  .page { flex: 1; overflow-y: auto; padding: 24px; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
  .page-title { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .page-sub { font-size: 13.5px; color: var(--text-2); margin-top: 3px; }
  .btn-primary { background: var(--brand); color: white; border-radius: 10px; padding: 10px 18px; font-size: 13.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 7px; transition: all 0.15s; box-shadow: 0 4px 12px rgba(92,79,229,0.3); }
  .btn-primary:hover { background: var(--brand-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(92,79,229,0.4); }
  .btn-outline { background: white; color: var(--text); border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 18px; font-size: 13.5px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px; transition: all 0.15s; }
  .btn-outline:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }
  .btn-group { display: flex; gap: 10px; align-items: center; }

  /* CARDS */
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .stat-card.highlight { background: var(--brand); color: white; }
  .stat-card.highlight .stat-label, .stat-card.highlight .stat-trend { color: rgba(255,255,255,0.8); }
  .stat-label { font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 10px; }
  .stat-value { font-size: 38px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
  .stat-card.highlight .stat-value { color: white; }
  .stat-trend { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 5px; }
  .stat-arrow { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: 16px; right: 16px; cursor: pointer; }
  .stat-card:not(.highlight) .stat-arrow { background: var(--bg); }

  /* DASHBOARD GRID */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .dash-grid .wide { grid-column: span 2; }
  .dash-grid .narrow { grid-column: span 1; }

  /* CHART BAR */
  .chart-wrap { display: flex; align-items: flex-end; gap: 8px; height: 90px; margin-top: 16px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 100%; background: var(--brand); border-radius: 30px 30px 16px 16px; transition: all 0.3s; cursor: pointer; min-height: 8px; }
  .bar:hover { background: var(--brand-dark); transform: scaleY(1.04); transform-origin: bottom; }
  .bar-label { font-size: 10px; color: var(--text-3); font-weight: 600; }

  /* MEMBER ROW */
  .member-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .member-row:last-child { border-bottom: none; }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 13.5px; font-weight: 700; color: var(--text); }
  .member-task { font-size: 11.5px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-green { background: #D1FAE5; color: #059669; }
  .badge-blue { background: #DBEAFE; color: #2563EB; }
  .badge-yellow { background: #FEF3C7; color: #D97706; }
  .badge-red { background: #FEE2E2; color: #DC2626; }
  .badge-purple { background: var(--brand-light); color: var(--brand); }
  .badge-gray { background: #F3F4F6; color: #6B7280; }

  /* PROJECT LIST */
  .project-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .project-item:last-child { border-bottom: none; }
  .proj-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .proj-name { font-size: 13.5px; font-weight: 700; color: var(--text); }
  .proj-due { font-size: 11.5px; color: var(--text-3); }

  /* MEETING CARD */
  .meeting-card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .meeting-title { font-size: 20px; font-weight: 800; color: var(--brand); margin-bottom: 6px; }
  .meeting-time { font-size: 13px; color: var(--text-2); margin-bottom: 16px; }
  .meeting-btn { width: 100%; background: var(--brand); color: white; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; }
  .meeting-btn:hover { background: var(--brand-dark); }

  /* DONUT */
  .donut-wrap { display: flex; flex-direction: column; align-items: center; }
  .donut-pct { font-size: 32px; font-weight: 800; color: var(--text); margin-top: -10px; }
  .donut-label { font-size: 12px; color: var(--text-2); margin-bottom: 12px; }
  .legend { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--text-2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* TIME TRACKER */
  .time-tracker { background: linear-gradient(135deg, #1A1D2E 0%, #2d3155 100%); border-radius: var(--radius); padding: 20px; color: white; }
  .tracker-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .tracker-time { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 14px; font-family: 'DM Sans', monospace; }
  .tracker-btns { display: flex; gap: 10px; }
  .tracker-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: transform 0.15s; }
  .tracker-btn:hover { transform: scale(1.1); }
  .tracker-btn.pause { background: white; color: #1A1D2E; }
  .tracker-btn.stop { background: #EF4444; color: white; }

  /* BOARD PAGE */
  .board-columns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: start; }
  .board-col { background: var(--bg); border-radius: var(--radius); padding: 14px; }
  .col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .col-title { font-size: 13.5px; font-weight: 800; color: var(--text); }
  .col-count { background: var(--border); color: var(--text-2); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .story-card { background: white; border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; }
  .story-card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .story-id { font-size: 10.5px; color: var(--text-3); font-weight: 700; margin-bottom: 6px; }
  .story-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.4; }
  .story-footer { display: flex; align-items: center; justify-content: space-between; }
  .points-badge { background: var(--brand-light); color: var(--brand); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
  .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 10px; margin: 8px 0; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--brand); border-radius: 10px; }
  .add-card-btn { width: 100%; background: transparent; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); padding: 10px; font-size: 13px; color: var(--text-3); font-weight: 600; transition: all 0.15s; }
  .add-card-btn:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* PROJECTS PAGE */
  .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .proj-card { background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; }
  .proj-card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .proj-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .proj-card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .proj-card-title { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .proj-card-desc { font-size: 12.5px; color: var(--text-2); margin-bottom: 14px; line-height: 1.5; }
  .proj-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-3); }
  .proj-avatars { display: flex; margin-left: auto; }
  .proj-avatars .avatar { width: 24px; height: 24px; font-size: 9px; border: 2px solid white; margin-left: -6px; }
  .proj-avatars .avatar:first-child { margin-left: 0; }
  .progress-ring-wrap { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .ring-label { font-size: 12px; font-weight: 700; color: var(--brand); }
  .ring-sub { font-size: 11px; color: var(--text-3); }
  .full-progress { height: 6px; background: var(--bg); border-radius: 10px; flex: 1; overflow: hidden; }
  .full-progress-fill { height: 100%; background: var(--brand); border-radius: 10px; }

  /* STORY DETAIL */
  .story-detail-grid { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
  .task-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .task-row:last-child { border-bottom: none; }
  .task-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .task-check.done { background: var(--brand); border-color: var(--brand); }
  .task-check.done::after { content: '✓'; font-size: 10px; color: white; font-weight: 800; }
  .task-text { font-size: 13.5px; flex: 1; }
  .task-text.done { text-decoration: line-through; color: var(--text-3); }
  .meta-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .meta-key { color: var(--text-3); font-weight: 600; }
  .meta-val { color: var(--text); font-weight: 600; }
  .comment-box { display: flex; gap: 10px; margin-top: 16px; }
  .comment-input { flex: 1; background: var(--bg); border: 1.5px solid transparent; border-radius: 10px; padding: 10px 14px; font-size: 13.5px; outline: none; transition: border-color 0.15s; resize: none; }
  .comment-input:focus { border-color: var(--brand); background: white; }

  /* BACKLOG PAGE */
  .backlog-table { width: 100%; border-collapse: collapse; }
  .backlog-table th { text-align: left; font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 14px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .backlog-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13.5px; color: var(--text); }
  .backlog-table tr:hover td { background: var(--brand-light); }
  .backlog-table tr:last-child td { border-bottom: none; }

  /* SETTINGS PAGE */
  .settings-grid { display: grid; grid-template-columns: 200px 1fr; gap: 24px; }
  .settings-nav .s-nav-item { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600; color: var(--text-2); cursor: pointer; transition: all 0.15s; margin-bottom: 2px; }
  .settings-nav .s-nav-item:hover { background: var(--brand-light); color: var(--brand); }
  .settings-nav .s-nav-item.active { background: var(--brand-light); color: var(--brand); font-weight: 700; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12.5px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .form-input { width: 100%; background: var(--bg); border: 1.5px solid transparent; border-radius: 10px; padding: 10px 14px; font-size: 13.5px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--brand); background: white; }
  .section-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 4px; letter-spacing: -0.3px; }
  .section-sub { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }
  .divider { height: 1px; background: var(--border); margin: 24px 0; }
  .toggle { width: 42px; height: 24px; border-radius: 12px; background: var(--border); cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle.on { background: var(--brand); }
  .toggle::after { content: ''; width: 18px; height: 18px; border-radius: 50%; background: white; position: absolute; top: 3px; left: 3px; transition: left 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .toggle.on::after { left: 21px; }

  /* TEAM PAGE */
  .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .team-card { background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); text-align: center; transition: all 0.15s; }
  .team-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .team-avatar { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 12px; font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
  .team-name { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
  .team-role { font-size: 12px; color: var(--text-3); margin-bottom: 12px; }
  .team-stats { display: flex; gap: 16px; justify-content: center; padding-top: 12px; border-top: 1px solid var(--border); }
  .team-stat { text-align: center; }
  .team-stat-n { font-size: 16px; font-weight: 800; color: var(--text); }
  .team-stat-l { font-size: 10.5px; color: var(--text-3); }

  /* CALENDAR */
  .cal-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day-header { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-3); padding: 6px; text-transform: uppercase; }
  .cal-day { min-height: 80px; border-radius: 8px; padding: 6px; background: white; border: 1.5px solid transparent; cursor: pointer; transition: all 0.15s; }
  .cal-day:hover { border-color: var(--brand); background: var(--brand-light); }
  .cal-day.today { border-color: var(--brand); }
  .cal-day.other-month { opacity: 0.4; }
  .cal-day-num { font-size: 12px; font-weight: 700; color: var(--text-2); margin-bottom: 3px; }
  .cal-day.today .cal-day-num { color: var(--brand); }

/* ── APP ROOT ── */
const App = () => {
  const [page, setPage] = useState('login');
  const [showNotif, setShowNotif] = useState(false);
  const [showModal, setShowModal] = useState(null);
  const [activeProjId, setActiveProjId] = useState(1);
  const [activeStoryId, setActiveStoryId] = useState('US-003');
  const [notifs, setNotifs] = useState(NOTIFICATIONS);

  const isAuth = !['login','register'].includes(page);

  const renderPage = () => {
    switch(page) {
      case 'login': return <LoginPage setPage={setPage}/>;
      case 'register': return <RegisterPage setPage={setPage}/>;
      case 'dashboard': return <Dashboard setPage={setPage} showModal={showModal} setShowModal={setShowModal}/>;
      case 'projects': return <ProjectsPage setPage={setPage} setActiveProjId={setActiveProjId} showModal={showModal} setShowModal={setShowModal}/>;
      case 'board': return <BoardPage projId={activeProjId} setPage={setPage} setActiveStoryId={setActiveStoryId} showModal={showModal} setShowModal={setShowModal}/>;
      case 'story': return <StoryDetail storyId={activeStoryId} setPage={setPage}/>;
      case 'backlog': return <BacklogPage showModal={showModal} setShowModal={setShowModal}/>;
      case 'calendar': return <CalendarPage/>;
      case 'analytics': return <AnalyticsPage/>;
      case 'team': return <TeamPage showModal={showModal} setShowModal={setShowModal}/>;
      case 'settings': return <SettingsPage/>;
      default: return <Dashboard setPage={setPage} showModal={showModal} setShowModal={setShowModal}/>;
    }
  };

  if (!isAuth) return <>
    {renderPage()}
    {showModal==='project' && <AddProjectModal onClose={()=>setShowModal(null)}/>}
  </>;

  return (
    <div className="app" onClick={()=>showNotif&&setShowNotif(false)}>
      <Sidebar page={page} setPage={setPage} setShowModal={setShowModal}/>
      <div className="main">
        <Topbar showNotif={showNotif} setShowNotif={setShowNotif}/>
        <div style={{position:'relative',flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {showNotif && <NotifPanel notifs={notifs} onClose={()=>setShowNotif(false)}/>}
          {renderPage()}
        </div>
      </div>
      {showModal==='project' && <AddProjectModal onClose={()=>setShowModal(null)}/>}
      {showModal==='story' && <AddStoryModal onClose={()=>setShowModal(null)}/>}
      {showModal==='member' && <AddMemberModal onClose={()=>setShowModal(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
